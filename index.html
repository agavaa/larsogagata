<!DOCTYPE html>
<html lang="nb">
   <head>
    <title>Lars og Agata</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
   </head>
   <body>
      <div id="header"></div>
      <main class="index-text">
         <h1>På tide at vi gifter oss!</h1>
         <div class="index-content">
            <div id="countdown">
               <div class="countdown--card">
                  <div id="countdown--days">
                     <span class="loader" />
                  </div>
                  <div class="countdown--label">dager</div>
               </div>
               <div class="countdown--card">
                  <div id="countdown--hours">
                     <span class="loader" />
                  </div>
                  <div class="countdown--label">timer</div>
               </div>
               <div class="countdown--card">
                  <div id="countdown--minutes">
                     <span class="loader" />
                  </div>
                  <div class="countdown--label">minutter</div>
               </div>
               <div class="countdown--card">
                  <div id="countdown--seconds">
                     <span class="loader" />
                  </div>
                  <div class="countdown--label">sekunder</div>
               </div>
            </div>
            <img src="images/us.jpg" class="image-us" />
            <label for="updates">Jeg vil få oppdateringer på epost</label>
            <input id="updates" />
            <button>Send inn</button>
      </div>

         <div class="main--bottom">
            <div class="img--blurred-container">
                <img src="./images/WitchWizardLove_cropped.jpg" alt="Heks og trollmann går en tur" class="img--blurred">
                <div class="img--blurred-block"></div>
            </div>
         </div>
      </main>
   </body> 
   <script src="js/include.js"></script>
   <script src="js/countdown.js"></script>
</html>
