<!DOCTYPE html>
<html lang="nb">
   <head>
    <title>Lars og Agata</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
   </head>
   <body>
      <div id="header"></div>
      <main class="index-text">
         <h1 data-i18n="itsTime">På tide at vi gifter oss!</h1>
         <div class="index-content">
            <div id="countdown">
               <div class="countdown--card">
                  <div id="countdown--days">
                     <span class="loader" />
                  </div>
                  <div class="countdown--label" data-i18n="days">dager</div>
               </div>
               <div class="countdown--card">
                  <div id="countdown--hours">
                     <span class="loader" />
                  </div>
                  <div class="countdown--label" data-i18n="hours">timer</div>
               </div>
               <div class="countdown--card">
                  <div id="countdown--minutes">
                     <span class="loader" />
                  </div>
                  <div class="countdown--label" data-i18n="minutes">minutter</div>
               </div>
               <div class="countdown--card">
                  <div id="countdown--seconds">
                     <span class="loader" />
                  </div>
                  <div class="countdown--label" data-i18n="seconds">sekunder</div>
               </div>
            </div>
            <img src="images/us.jpg" class="image-us" alt="Agata og Lars" />
            <form
               action="https://buttondown.com/api/emails/embed-subscribe/largehendrix"
               method="post"
            >
               <h2 data-i18n="follow">
                  Følg med på oppdateringer rundt brylluppet
               </h2>
               <p data-i18n="notifications">Vi sender ut notifikasjoner når det kommer mer informasjon på nettsiden.</p>
               <div class="newsletter-form-group">
                  <label for="bd-email" data-i18n="email">Epostadresse</label>
                  <input type="email" name="email" id="bd-email" />
                  <button type="submit" data-i18n="subscribe">Abonner</button>
               </div>
            </form>
      </div>

         <div class="main--bottom">
            <div class="img--blurred-container">
                <img src="./images/WitchWizardLove_cropped.jpg" alt="Heks og trollmann går en tur" class="img--blurred">
                <div class="img--blurred-block"></div>
            </div>
         </div>
      </main>
   </body> 
   <script src="js/include.js"></script>
   <script src="js/countdown.js"></script>
</html>
